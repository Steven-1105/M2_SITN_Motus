# =====================================================================
#  player-service  (joueurs : inscription, identite)
# =====================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: player-service
  labels: { app: player-service }
spec:
  replicas: 1
  selector:
    matchLabels: { app: player-service }
  template:
    metadata:
      labels: { app: player-service }
    spec:
      containers:
        - name: player-service
          image: player-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/motus_players?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef: { name: motus-db, key: MYSQL_ROOT_PASSWORD }
          resources:
            requests: { cpu: "150m", memory: "300Mi" }
            limits:   { cpu: "700m", memory: "600Mi" }
          startupProbe:
            httpGet: { path: /actuator/health, port: 8081 }
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8081 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8081 }
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: player-service
spec:
  selector: { app: player-service }
  ports:
    - port: 8081
      targetPort: 8081
