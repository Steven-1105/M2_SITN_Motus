# Profil de TEST : base H2 en memoire (pas besoin d'un serveur MySQL pour mvn test).
spring.datasource.url=jdbc:h2:mem:motus_scores;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Pas de seed en tests (INSERT IGNORE est specifique MySQL, incompatible H2)
spring.sql.init.mode=never
