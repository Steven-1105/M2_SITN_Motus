spring.application.name=score-service
server.port=8084

# --- Base de donnees MySQL (donnees REELLES a conserver entre redemarrages) ---
spring.datasource.url=jdbc:mysql://localhost:3306/motus_scores?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# update (et non create-drop) : on garde les scores accumules au fil des parties.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Supervision
management.endpoints.web.exposure.include=health,info
