spring.application.name=dict-service
server.port=8083

# --- Base de donnees MySQL (choix du binome : persistance entre redemarrages) ---
# createDatabaseIfNotExist=true => la base motus_dictionary est creee si absente
spring.datasource.url=jdbc:mysql://localhost:3306/motus_dictionary?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Le dictionnaire est une donnee de REFERENCE (statique) : on recree le schema
# et on le recharge depuis data.sql a chaque demarrage -> pas de doublons.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# data.sql doit s'executer APRES la creation du schema par Hibernate,
# et aussi pour une base non-embarquee (MySQL) -> mode always.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
# 1) charge les mots reconnus, 2) retire les entrees refusees en validation,
# 3) marque les mots courants autorises comme mots mysteres.
spring.sql.init.data-locations=classpath:data.sql,classpath:data-cleanup.sql,classpath:data-jouable.sql

# Supervision (cf. dependances communes du PDF)
management.endpoints.web.exposure.include=health,info
