# Profil de TEST : base H2 en memoire (pas besoin d'un serveur MySQL pour mvn test).
spring.datasource.url=jdbc:h2:mem:motus_dictionary;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
# On charge le PETIT dico de test puis le meme nettoyage que la production.
spring.sql.init.data-locations=classpath:data-test.sql,classpath:data-cleanup.sql
