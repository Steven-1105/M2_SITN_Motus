spring.application.name=dict-service
server.port=8083

# Base H2 en memoire (developpement local, comme dans le cours)
spring.datasource.url=jdbc:h2:mem:motus_dictionary
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# Console H2 : http://localhost:8083/h2-console  (JDBC URL : jdbc:h2:mem:motus_dictionary)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actuator : http://localhost:8083/actuator/health
management.endpoints.web.exposure.include=health,info
